  font-family: 'Courier New', monospace; font-size: 12px;
}
button:hover { background: #252525; color: #ccc; }
#viewport { position: fixed; top: 42px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; }
#viewport:active { cursor: grabbing; }

<div id="controls">
  <button onclick="resetView()">⌂ Reset</button>
  <button onclick="zoom(1.25)">＋</button>
  <button onclick="zoom(0.8)">－</button>
</div>

<script>
const vp = document.getElementById('viewport');
const sch = document.getElementById('sch');
let scale = 1, tx = 0, ty = 0;
let dragging = false, startX, startY, startTx, startTy;

function applyTransform() {
  sch.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  sch.style.transformOrigin = '0 0';
}
function zoom(f) {
  const cx = vp.clientWidth/2, cy = vp.clientHeight/2;
  tx = cx - f*(cx - tx); ty = cy - f*(cy - ty); scale *= f;
  applyTransform();
}
function resetView() {
  const sw = sch.width.baseVal.value, sh = sch.height.baseVal.value;
  const vw = vp.clientWidth, vh = vp.clientHeight;
  scale = Math.min(vw/sw, vh/sh) * 0.97;
  tx = (vw - sw*scale)/2; ty = 4;
  applyTransform();
}
vp.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.12 : 0.89;
  const r = vp.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  tx = mx - f*(mx - tx); ty = my - f*(my - ty); scale *= f;
  applyTransform();
}, { passive: false });
vp.addEventListener('mousedown', e => {
  dragging = true; startX = e.clientX; startY = e.clientY;
  startTx = tx; startTy = ty;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx = startTx + e.clientX - startX;
  ty = startTy + e.clientY - startY;
  applyTransform();
});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('load', resetView);
</script>
